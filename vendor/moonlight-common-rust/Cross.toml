[target.x86_64-pc-windows-gnu]
pre-build = [
    # -- Overwrite the openssl finder so we just don't do anything (it'll just error out even though we have the lib)
    "echo \"\" > $(cmake --system-information | grep CMAKE_ROOT | cut -d'\"' -f2)/Modules/FindOpenSSL.cmake",
    # -- Set required Windows flags for mingw64 headers for moonlight-common-c compilation to work
    "echo 'set(CMAKE_C_FLAGS \"${CMAKE_C_FLAGS} -D_WIN32_WINNT=0x0600 -DHAS_PQOS_FLOWID -DHAS_QOS_FLOWID\")' >> /opt/toolchain.cmake",
    "echo 'set(CMAKE_CXX_FLAGS \"${CMAKE_CXX_FLAGS} -D_WIN32_WINNT=0x0600 -DHAS_PQOS_FLOWID -DHAS_QOS_FLOWID\")' >> /opt/toolchain.cmake",
    # -- Overwrite system MinGW-w64 headers with latest version
    # Install wget/unzip if not already present
    "apt-get update && apt-get install -y wget unzip",
    # Download and extract latest mingw-w64 headers
    "wget -q https://github.com/mirror/mingw-w64/archive/refs/heads/master.zip -O /tmp/mingw-w64.zip",
    "unzip -q /tmp/mingw-w64.zip -d /tmp",
    # Copy headers into cross sysroot
    "cp -r /tmp/mingw-w64-master/mingw-w64-headers/include/. \"$CROSS_SYSROOT/include/\"",
    # Cleanup only what we created
    "rm -rf /tmp/mingw-w64.zip /tmp/mingw-w64-master",
    # For some reason the stdbool.h is not in the include path
    "ln -s /usr/lib/gcc/x86_64-w64-mingw32/$($CROSS_TOOLCHAIN_PREFIX\"gcc\"$CROSS_TOOLCHAIN_SUFFIX -dumpversion)/include/stdbool.h $CROSS_SYSROOT/include/stdbool.h",
]
