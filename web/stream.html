<!DOCTYPE html>
<html lang="en" class="stream">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widgets=overlays-content" />
    <title>Stream</title>
    <link rel="icon" href="resources/cloudgime.svg" sizes="any" type="image/svg+xml">

    <script>
        (() => {
            const buildToken = "20260422q003";
            const url = new URL(window.location.href);
            if (url.searchParams.get("cb") === buildToken) {
                return;
            }

            url.searchParams.set("cb", buildToken);
            window.location.replace(url.toString());
        })();
    </script>

    <link rel="stylesheet" href="styles/standard.css?v=20260422q002" id="style">
    <script type="module" src="styles/index.js?v=20260422q002"></script>

    <script type="module" src="stream.js?v=20260422q005" defer></script>
</head>

<body class="stream">
    <!-- Modal -->
    <div id="modal-overlay" class="modal-background modal-disabled">
        <!-- Modal Content -->
        <div id="modal-parent" class="modal-content">
        </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar-overlay prevent-start-transition" id="sidebar-root">
        <div class="sidebar-background prevent-start-transition">
            <button id="sidebar-button" class="sidebar-button"><img src="resources/arrow_left.svg"
                    class="sidebar-button-image prevent-start-transition" /></button>
            <div id="sidebar-parent" class="sidebar-content">
            </div>
        </div>
    </div>

    <!-- Errors -->
    <div id="error-list">
    </div>

    <!-- A dummy element for capturing inputs -->
    <div id="input" tabindex="0"></div>

    <!-- Main App View -->
    <div id="root">
    </div>

</body>

</html>
